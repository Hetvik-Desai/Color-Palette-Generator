<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Paltette Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div class="container"> <!--Main container for all the other components-->
        <h1>Color Palette Generator</h1> <!--Heading inside the main container-->
        <button id = "generateBtn"> <!--Button to generate all the palettes-->
            <i class = "fas fa-sync-alt"></i> <!--Symbol inside the generate button-->
            Generate Palette
        </button>
        <div class="palette-container">
            <!-- Color Box 1 -->
             <div class="color-box">
                <div class="color" style="background-color: #e1f5fe;"></div> <!--Initial color present in box1-->
                <div class="color-info"><!--Container to display hex values of the current colors-->
                    <span class = "hex-value">#E1F5FE</span>
                    <i class = "far fa-copy copy-btn" title = "Copy to clipboard"></i>
                </div>
             </div>
             <!-- Color Box 2 -->
             <div class="color-box">
                <div class="color" style="background-color: #cabac8;"></div> <!--Initial color present in box2-->
                <div class="color-info"><!--Container to display hex values of the current colors-->
                    <span class = "hex-value">#CABAC8</span>
                    <i class = "far fa-copy copy-btn" title = "Copy to clipboard"></i>
                </div>
             </div>
             <!-- Color Box 3 -->
             <div class="color-box">
                <div class="color" style="background-color: #353531;"></div> <!--Initial color present in box3-->
                <div class="color-info"><!--Container to display hex values of the current colors-->
                    <span class = "hex-value">#353531</span>
                    <i class = "far fa-copy copy-btn" title = "Copy to clipboard"></i>
                </div>
             </div>
             <!-- Color Box 4 -->
             <div class="color-box"> 
                <div class="color" style="background-color: #daf7dc;"></div><!--Initial color present in box4-->
                <div class="color-info"><!--Container to display hex values of the current colors-->
                    <span class = "hex-value">#DAF7DC</span>
                    <i class = "far fa-copy copy-btn" title = "Copy to clipboard"></i>
                </div>
             </div>
             <!-- Color Box 5 -->
             <div class="color-box">
                <div class="color" style="background-color: #f6f4d2;"></div> <!--Initial color present in box5-->
                <div class="color-info"><!--Container to display hex values of the current colors-->
                    <span class = "hex-value">#F6F4D2</span>
                    <i class = "far fa-copy copy-btn" title = "Copy to clipboard"></i>
                </div>
             </div>
        </div>
    </div>
    <script src = "script.js"></script>
</body>
</html>
